# straitjacket-allow-file[:duplication] â€” per-job `needs:`/`if:` gating and the
# shared checkout/toolchain/cache setup necessarily repeat across jobs in Actions YAML
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

jobs:
  # Fan-out: decide whether a PR actually touches anything the build depends
  # on. A docs-only PR skips the heavy compile/test job below â€” and a skipped
  # required check still reports green, so branch protection stays happy.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'hinzu-self.toml'
              - 'adapters/**'
              - '.github/workflows/ci.yml'

  rust:
    name: rust
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Run hinzu check on hinzu-core itself: a functional-core regression guard.
  # The analysis engine (the fact schema, the propagation engine, the policy
  # check) must reach no effect; effects are confined to the SQLite fact store
  # and the seam that drives it. `hinzu-self.toml` states that boundary, and
  # this job fails on any leak.
  #
  # Isolated from the `rust` job on purpose. That job is stable-only: the
  # workspace pins 1.96.0 because `dbsp` ICEs on newer rustc. This job adds the
  # pinned nightly the StableMIR driver needs, but never builds the workspace
  # (or `dbsp`) with it â€” the CLI is built on stable, and the nightly only ever
  # compiles the driver and hinzu-core-under-the-driver, neither of which pulls
  # in `dbsp`. The two toolchains never cross.
  self-check:
    name: self-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: install toolchains
        run: |
          # Stable builds the CLI (no fmt/clippy needed here â€” the `rust` job
          # owns those). The nightly builds the driver and compiles hinzu-core
          # under it, so it needs the compiler-internal components. Each
          # component takes its own `-c`: rustup reads a bare word after
          # `--component` as another toolchain name, not a second component.
          rustup toolchain install 1.96.0 --profile minimal
          rustup toolchain install nightly-2026-07-18 --profile minimal \
            -c rustc-dev -c llvm-tools -c rust-src
          rustup default 1.96.0
      - uses: Swatinem/rust-cache@v2
      # Build the CLI on stable (the workspace pin, via rust-toolchain.toml).
      - name: build the hinzu CLI (stable 1.96.0)
        run: cargo build --release -p hinzu-cli
      # Build the StableMIR driver on its pinned nightly. `working-directory`
      # makes the driver's own rust-toolchain.toml select the nightly.
      - name: build the StableMIR driver (nightly-2026-07-18)
        working-directory: crates/hinzu-rustc-driver
        run: cargo build --release
      # Extract facts from hinzu-core with the driver, seed rusqlite/std roots,
      # propagate, and check against the functional-core policy. A leaked effect
      # in the pure core is a nonzero exit that fails the job.
      - name: hinzu check crates/hinzu-core (functional-core guard)
        env:
          HINZU_RUSTC_DRIVER: ${{ github.workspace }}/crates/hinzu-rustc-driver/target/release/hinzu-rustc-driver
        run: ./target/release/hinzu check crates/hinzu-core --policy hinzu-self.toml

  # Run `hinzu check` on the TypeScript fixture end to end: build the CLI on
  # stable, install the Node adapter's one dependency (typescript), and check the
  # fixture project through the SHARED pipeline (adapter -> SQLite -> DBSP ->
  # policy). It must flag the functional-core leak with the evidence path.
  #
  # Isolated from the `rust` job like `self-check` is. Node lives only here; the
  # stable Rust jobs never depend on it. This job builds the CLI on the workspace
  # pin (1.96.0, via rust-toolchain.toml) and never touches the nightly driver.
  ts-check:
    name: ts-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install the TypeScript adapter's dependencies
        working-directory: adapters/typescript
        run: npm install --no-audit --no-fund
      # The live adapter path: the ignored ts_check test builds the CLI (debug)
      # itself via assert_cmd and drives it over the fixture â€” the Node compiler
      # API extracts facts, they propagate, and the functional-core leak must be
      # flagged. One build (no separate release step) keeps the cold `dbsp`
      # compile within budget.
      - name: hinzu check the TypeScript fixture (functional-core leak)
        run: cargo test -p hinzu-cli --test ts_check -- --ignored --exact check_typescript_project_end_to_end

  # Run `hinzu check` on the Python fixture end to end: build the CLI on stable,
  # install ty (the adapter's sole resolution backend), and check the fixture
  # project through the SHARED pipeline (adapter -> SQLite -> DBSP -> policy). It
  # must flag the functional-core leaks with their evidence paths.
  #
  # ty ON THE HEADLESS RUNNER. On this runner ty resolves `import subprocess` to
  # the interpreter's REAL stdlib source (`.../lib/python3.11/subprocess.py`), not
  # its vendored typeshed stub. The adapter's `module_of_target` recognizes that
  # real-stdlib path as STDLIB (alongside vendored typeshed + site-packages), so
  # `subprocess.run` resolves here exactly as it does locally against vendored
  # typeshed (see notes/python-catalog.md). So this job runs its live assertion on
  # ty (pinned `ty==0.0.61`), the same backend used locally and in real use â€” no
  # fallback. The diagnostics step below dumps a definition probe + ty server logs.
  #
  # Isolated from the `rust` job like `self-check` and `ts-check` are. Python and
  # ty live ONLY here; the stable Rust jobs never install them and never depend
  # on Python â€” their Python coverage is the committed sample-facts test
  # (`check_python_facts_reports_the_core_violations`), which runs from JSON with
  # no backend. This job builds the CLI on the workspace pin (1.96.0, via
  # rust-toolchain.toml) and never touches the nightly driver.
  py-check:
    name: py-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ty is the Python path's sole resolution backend, spawned by the all-Rust
      # generic LSP extractor (`hinzu-lsp`). Pin `ty==0.0.61` so the `ty` binary
      # lands on PATH; there is no Python adapter package to install any more.
      - name: install the Python resolution backend (ty)
        run: pip install ty==0.0.61
      # Diagnostics: record ty's version and how it resolves the fixture's
      # environment and imported-stdlib symbols on THIS runner (the headless-runner
      # real-stdlib case), so a resolution regression yields a real log rather than
      # a bare test failure. The last step is an all-Rust dry run of the extractor
      # over the fixture with its stderr diagnostics â€” no Python driver involved.
      - name: ty resolution diagnostics on this runner
        run: |
          ty --version
          echo "--- ty check -vvv (environment + module resolution) ---"
          ty check --project adapters/python/tests/fixture --python-version 3.11 \
            --python-platform linux --exit-zero -vvv 2>&1 | \
            grep -iE "python version|platform|stdlib|search path|vendored|requires-python|not found|subprocess" || true
          echo "--- hinzu-lsp extractor dry run over the fixture (ty backend, stderr) ---"
          HINZU_LSP_DEBUG=1 cargo run -p hinzu-lsp --example extract -- \
            adapters/python/tests/fixture >/dev/null
      # The live path, on ty: the ignored py_check test builds the CLI (debug)
      # itself via assert_cmd and drives it over the fixture â€” the ALL-RUST
      # extractor drives ty over its LSP, the facts propagate, and the
      # functional-core leaks must be flagged. One build (no separate release step)
      # keeps the cold `dbsp` compile within budget.
      - name: hinzu check the Python fixture with ty (functional-core leaks)
        run: cargo test -p hinzu-cli --test py_check -- --ignored --exact check_python_project_end_to_end

  # Run `hinzu check` on the Go fixture end to end: build the CLI on stable,
  # install gopls (the Go path's sole resolution backend), and check the fixture
  # module through the SHARED pipeline (adapter -> SQLite -> DBSP -> policy). It
  # must flag the functional-core leaks with their evidence paths.
  #
  # gopls needs a Go toolchain to typecheck the module. `gopls@v0.23.0` requires
  # Go >= 1.26, so this job installs Go 1.26 with `setup-go` â€” that keeps the
  # gopls build (and its runtime typechecking of the fixture) on one toolchain, no
  # `GOTOOLCHAIN` auto-download. The fixture is stdlib-only, so `go mod download`
  # fetches nothing; it is run to prove the module resolves before gopls drives.
  #
  # Isolated from the `rust` job like `self-check`, `ts-check`, and `py-check`
  # are. Go and gopls live ONLY here; the stable Rust jobs never install them and
  # never depend on Go â€” their Go coverage is the committed sample-facts test
  # (`check_go_facts_reports_the_core_violations`), which runs from JSON with no
  # backend. This job builds the CLI on the workspace pin (1.96.0, via
  # rust-toolchain.toml) and never touches the nightly driver.
  go-check:
    name: go-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # gopls is the Go path's sole resolution backend, spawned by the all-Rust
      # generic LSP extractor (`hinzu-lsp`). Pin `gopls@v0.23.0` so the build is
      # reproducible, and put the module bin dir on PATH so the `gopls` binary is
      # found by the extractor's server-availability check.
      - name: install the Go resolution backend (gopls)
        run: |
          go install golang.org/x/tools/gopls@v0.23.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Prove the fixture module resolves (stdlib-only, so nothing is fetched).
      - name: go mod download for the fixture
        working-directory: adapters/go/tests/fixture
        run: go mod download
      # Diagnostics: gopls version and an all-Rust dry run of the extractor over
      # the fixture with its stderr summary (files/definitions/edges/roots), so a
      # resolution regression yields a real log rather than a bare test failure.
      - name: gopls resolution diagnostics on this runner
        run: |
          gopls version
          echo "--- hinzu-lsp extractor dry run over the fixture (gopls backend, stderr) ---"
          HINZU_LSP_DEBUG=1 cargo run -p hinzu-lsp --example extract -- \
            adapters/go/tests/fixture >/dev/null
      # The live path, on gopls: the ignored go_check test builds the CLI (debug)
      # itself via assert_cmd and drives it over the fixture â€” the ALL-RUST
      # extractor drives gopls over its LSP, the facts propagate, and the
      # functional-core leaks must be flagged. One build (no separate release step)
      # keeps the cold `dbsp` compile within budget.
      - name: hinzu check the Go fixture with gopls (functional-core leaks)
        run: cargo test -p hinzu-cli --test go_check -- --ignored --exact check_go_project_end_to_end
