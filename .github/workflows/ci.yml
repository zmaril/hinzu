# straitjacket-allow-file[:duplication] — per-job `needs:`/`if:` gating and the
# shared checkout/toolchain/cache setup necessarily repeat across jobs in Actions YAML
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

jobs:
  # Fan-out: decide whether a PR actually touches anything the build depends
  # on. A docs-only PR skips the heavy compile/test job below — and a skipped
  # required check still reports green, so branch protection stays happy.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'hinzu-self.toml'
              - 'adapters/**'
              - '.github/workflows/ci.yml'

  rust:
    name: rust
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Run hinzu check on hinzu-core itself: a functional-core regression guard.
  # The analysis engine (the fact schema, the propagation engine, the policy
  # check) must reach no effect; effects are confined to the SQLite fact store
  # and the seam that drives it. `hinzu-self.toml` states that boundary, and
  # this job fails on any leak.
  #
  # Isolated from the `rust` job on purpose. That job is stable-only: the
  # workspace pins 1.96.0 because `dbsp` ICEs on newer rustc. This job adds the
  # pinned nightly the StableMIR driver needs, but never builds the workspace
  # (or `dbsp`) with it — the CLI is built on stable, and the nightly only ever
  # compiles the driver and hinzu-core-under-the-driver, neither of which pulls
  # in `dbsp`. The two toolchains never cross.
  self-check:
    name: self-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: install toolchains
        run: |
          # Stable builds the CLI (no fmt/clippy needed here — the `rust` job
          # owns those). The nightly builds the driver and compiles hinzu-core
          # under it, so it needs the compiler-internal components. Each
          # component takes its own `-c`: rustup reads a bare word after
          # `--component` as another toolchain name, not a second component.
          rustup toolchain install 1.96.0 --profile minimal
          rustup toolchain install nightly-2026-07-18 --profile minimal \
            -c rustc-dev -c llvm-tools -c rust-src
          rustup default 1.96.0
      - uses: Swatinem/rust-cache@v2
      # Build the CLI on stable (the workspace pin, via rust-toolchain.toml).
      - name: build the hinzu CLI (stable 1.96.0)
        run: cargo build --release -p hinzu-cli
      # Build the StableMIR driver on its pinned nightly. `working-directory`
      # makes the driver's own rust-toolchain.toml select the nightly.
      - name: build the StableMIR driver (nightly-2026-07-18)
        working-directory: crates/hinzu-rustc-driver
        run: cargo build --release
      # Extract facts from hinzu-core with the driver, seed rusqlite/std roots,
      # propagate, and check against the functional-core policy. A leaked effect
      # in the pure core is a nonzero exit that fails the job.
      - name: hinzu check crates/hinzu-core (functional-core guard)
        env:
          HINZU_RUSTC_DRIVER: ${{ github.workspace }}/crates/hinzu-rustc-driver/target/release/hinzu-rustc-driver
        run: ./target/release/hinzu check crates/hinzu-core --policy hinzu-self.toml

  # Run `hinzu check` on the TypeScript fixture end to end: build the CLI on
  # stable, install the Node adapter's one dependency (typescript), and check the
  # fixture project through the SHARED pipeline (adapter -> SQLite -> DBSP ->
  # policy). It must flag the functional-core leak with the evidence path.
  #
  # Isolated from the `rust` job like `self-check` is. Node lives only here; the
  # stable Rust jobs never depend on it. This job builds the CLI on the workspace
  # pin (1.96.0, via rust-toolchain.toml) and never touches the nightly driver.
  ts-check:
    name: ts-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install the TypeScript adapter's dependencies
        working-directory: adapters/typescript
        run: npm install --no-audit --no-fund
      # The live adapter path: the ignored ts_check test builds the CLI (debug)
      # itself via assert_cmd and drives it over the fixture — the Node compiler
      # API extracts facts, they propagate, and the functional-core leak must be
      # flagged. One build (no separate release step) keeps the cold `dbsp`
      # compile within budget.
      - name: hinzu check the TypeScript fixture (functional-core leak)
        run: cargo test -p hinzu-cli --test ts_check -- --ignored --exact check_typescript_project_end_to_end

  # Run `hinzu check` on the Python fixture end to end: build the CLI on stable,
  # install ty (the adapter's sole resolution backend), and check the fixture
  # project through the SHARED pipeline (adapter -> SQLite -> DBSP -> policy). It
  # must flag the functional-core leaks with their evidence paths.
  #
  # ty ON THE HEADLESS RUNNER. ty's environment auto-discovery is unreliable on a
  # headless runner: an un-pinned `ty server` there resolves `builtins` but
  # returns null for imported-stdlib symbols like `subprocess.run`. The adapter
  # fixes this at the source — it pins ty's target `python-version` /
  # `python-platform` in the LSP `initialize` and warms the vendored typeshed with
  # a synchronous `ty check` before the batch (see notes/python-catalog.md), so
  # stdlib imports resolve deterministically from vendored typeshed. So this job
  # runs its live assertion on ty (pinned `ty==0.0.61`), the same backend used
  # locally and in real use — no fallback.
  #
  # Isolated from the `rust` job like `self-check` and `ts-check` are. Python and
  # ty live ONLY here; the stable Rust jobs never install them and never depend
  # on Python — their Python coverage is the committed sample-facts test
  # (`check_python_facts_reports_the_core_violations`), which runs from JSON with
  # no backend. This job builds the CLI on the workspace pin (1.96.0, via
  # rust-toolchain.toml) and never touches the nightly driver.
  py-check:
    name: py-check
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ty is the adapter's sole backend. `ast` is stdlib; this installs the
      # pinned `ty==0.0.61` from requirements.txt (the `ty` binary lands on PATH).
      - name: install the Python adapter's resolution backend (ty)
        working-directory: adapters/python
        run: pip install -r requirements.txt
      # Diagnostics: record ty's version and exactly how it resolves the fixture's
      # environment and imported-stdlib symbols on THIS runner, so a resolution
      # regression yields a real log (env discovery, python-version/platform, and
      # a `subprocess.run` definition probe) rather than a bare test failure.
      - name: ty resolution diagnostics on this runner
        working-directory: adapters/python
        env:
          RUST_LOG: "ty_server=debug,ty_ide=debug,ty_module_resolver=debug,ty_python_semantic=debug"
        run: |
          ty --version
          echo "--- ty check -vvv (environment + module resolution) ---"
          ty check --project tests/fixture --python-version 3.11 \
            --python-platform linux --exit-zero -vvv 2>&1 | \
            grep -iE "python version|platform|stdlib|search path|vendored|requires-python|not found|subprocess" || true
          echo "--- ty LSP definition probe (subprocess.run vs open, with server logs) ---"
          python3 tests/ty_lsp_probe.py
          echo "--- adapter dry run (ty backend, stderr diagnostics) ---"
          python3 analyze.py tests/fixture >/dev/null
      # The live adapter path, on ty: the ignored py_check test builds the CLI
      # (debug) itself via assert_cmd and drives it over the fixture — the adapter
      # extracts facts with ty, they propagate, and the functional-core leaks must
      # be flagged. One build (no separate release step) keeps the cold `dbsp`
      # compile within budget.
      - name: hinzu check the Python fixture with ty (functional-core leaks)
        run: cargo test -p hinzu-cli --test py_check -- --ignored --exact check_python_project_end_to_end
