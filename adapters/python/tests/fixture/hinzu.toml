# The fixture's functional-core policy. `core.py` is the pure core — no
# filesystem, network, or subprocess effects, however deep the call chain.
# `effects.py` is the sanctioned adapter layer, where those effects are allowed
# to live. `hinzu check` must flag `load_and_summarize` (in the core) for reaching
# the filesystem through `read_config`, with the evidence path down to the
# `builtins::open` root.

[analysis]
on_unknown = "fail"

# The functional core: no effects. `effects.py` is carved out below.
[region.core]
paths  = ["*.py"]
forbid = ["fs", "net", "process"]

# The adapter layer — where the filesystem and subprocess effects belong.
[region.effects]
paths = ["effects.py"]
allow = ["fs", "net", "process", "env", "clock", "random"]
