# Port-diff config: the `pi` TypeScript monorepo → the `atilla` Rust workspace.
#
# `hinzu port-diff --config notes/port-pi-atilla.toml --package <name>` selects one
# package below and diffs its source graph against its Rust port. The shared
# naming rules apply to every package; the per-package `[packages.X]` table gives
# the source/target directories and the crate-specific prefixes.
#
# Path resolution: every relative path here (`source_dir`, `target_dir`,
# `conformance_manifest`) is resolved against `base_dir`. `target_src_prefix` is
# NOT a filesystem path — it is the workspace-relative prefix a target file
# carries in the emitted graph (`crates/atilla-ai/src/...`), so it stays verbatim.

source_kind = "ts"
target_kind = "rust"
ported_threshold = 0.6
cluster_vote_retain = 0.6

# Everything below is relative to this directory (the atilla workspace root).
base_dir = "/workspace/atilla"
# The conformance manifest, relative to base_dir. The CLI reads it and hands the
# text to the pure core; `conformance_package` (per package) filters it.
conformance_manifest = "conformance/manifest.json"
# The manifest `status` value that marks a module test-verified.
native_status = "native"

# The shared TS→Rust naming rules — identical across all packages.
[naming]
file_segment_case = "kebab_to_snake"   # google-shared -> google_shared
fn_case = "camel_to_snake"             # convertMessages -> convert_messages
keep_pascal_types = true               # AnthropicModel kept verbatim
keep_screaming_consts = true           # MAX_TOKENS kept verbatim
strip_suffixes = [".lazy"]             # anthropic-messages.lazy.ts -> anthropic-messages
source_src_prefix = "src"              # a source file's leading dir

# ---- packages -------------------------------------------------------------

[packages.ai]
source_dir = "vendor/pi/packages/ai"
target_dir = "crates/atilla-ai"
strip_crate_prefix = "atilla_ai"
target_src_prefix = "crates/atilla-ai/src"
conformance_package = "ai"

[packages.agent]
source_dir = "vendor/pi/packages/agent"
target_dir = "crates/atilla-agent"
strip_crate_prefix = "atilla_agent"
target_src_prefix = "crates/atilla-agent/src"
conformance_package = "agent"

[packages.coding-agent]
source_dir = "vendor/pi/packages/coding-agent"
target_dir = "crates/atilla-coding"
strip_crate_prefix = "atilla_coding"
target_src_prefix = "crates/atilla-coding/src"
conformance_package = "coding-agent"

[packages.tui]
source_dir = "vendor/pi/packages/tui"
target_dir = "crates/atilla-tui"
strip_crate_prefix = "atilla_tui"
target_src_prefix = "crates/atilla-tui/src"
conformance_package = "tui"

[packages.orchestrator]
source_dir = "vendor/pi/packages/orchestrator"
target_dir = "crates/atilla-orchestrator"
strip_crate_prefix = "atilla_orchestrator"
target_src_prefix = "crates/atilla-orchestrator/src"
conformance_package = "orchestrator"
