"os::rename" = "fs"
"os::renames" = "fs"
"os::replace" = "fs"
"os::link" = "fs"
"os::symlink" = "fs"
"os::readlink" = "fs"
"os::chmod" = "fs"
"os::chown" = "fs"
"os::truncate" = "fs"
"os::access" = "fs"

# os.path predicates that stat the filesystem. ty resolves `os.path` to the
# concrete `posixpath` / `ntpath` / `genericpath` implementation module, so
# those spellings are listed too.
"os::path.exists" = "fs"
"os::path.isfile" = "fs"
"os::path.isdir" = "fs"
"os::path.islink" = "fs"
"os::path.getsize" = "fs"
"os::path.getmtime" = "fs"
"os::path.getctime" = "fs"
"os::path.getatime" = "fs"
"os::path.realpath" = "fs"
"os::path.samefile" = "fs"
"posixpath::exists" = "fs"
"posixpath::isfile" = "fs"
"posixpath::isdir" = "fs"
"posixpath::islink" = "fs"
"posixpath::getsize" = "fs"
"posixpath::getmtime" = "fs"
"posixpath::realpath" = "fs"
"posixpath::samefile" = "fs"
"ntpath::exists" = "fs"
"ntpath::isfile" = "fs"
"ntpath::isdir" = "fs"
"genericpath::exists" = "fs"
"genericpath::isfile" = "fs"
"genericpath::isdir" = "fs"
"genericpath::getsize" = "fs"
"genericpath::getmtime" = "fs"

# pathlib I/O methods. The bare `pathlib.Path(...)` constructor and pure path
# algebra (`joinpath`, `with_suffix`, `parent`, `name`) are NOT effects; only the
# methods that touch the filesystem are `fs`.
"pathlib::Path.open" = "fs"
"pathlib::Path.read_text" = "fs"
"pathlib::Path.write_text" = "fs"
"pathlib::Path.read_bytes" = "fs"
"pathlib::Path.write_bytes" = "fs"
"pathlib::Path.mkdir" = "fs"
"pathlib::Path.rmdir" = "fs"
"pathlib::Path.unlink" = "fs"
"pathlib::Path.touch" = "fs"
"pathlib::Path.rename" = "fs"
"pathlib::Path.replace" = "fs"
"pathlib::Path.symlink_to" = "fs"
"pathlib::Path.hardlink_to" = "fs"
"pathlib::Path.chmod" = "fs"
"pathlib::Path.stat" = "fs"
"pathlib::Path.lstat" = "fs"
"pathlib::Path.exists" = "fs"
"pathlib::Path.is_file" = "fs"
"pathlib::Path.is_dir" = "fs"
"pathlib::Path.is_symlink" = "fs"
"pathlib::Path.glob" = "fs"
"pathlib::Path.rglob" = "fs"
"pathlib::Path.iterdir" = "fs"
"pathlib::Path.walk" = "fs"
"pathlib::Path.resolve" = "fs"
"pathlib::Path.samefile" = "fs"
"pathlib::Path.expanduser" = "fs"

