# hinzu's built-in Python effect annotations — the shipped library annotation
# set for Python, the counterpart to `std.toml` for Rust and `node.toml` for
# TypeScript. It maps the CPython standard library's built-in effect surface to
# hinzu's ONE flat, shared effect vocabulary: `fs` is `fs` and `net` is `net`
# for every language. Python seeds a SUBSET of the shared categories; a category
# that does not apply simply does not appear.
#
# There is deliberately NO `alloc` effect for Python. Rust's `alloc` marks heap
# allocation as a certifiable effect; on a garbage-collected runtime an
# allocation is not an observable effect a functional-core policy can meaningfully
# forbid, so it is absent here — absent, not renamed. `db` is a shared category
# but Python reaches a database through a package (`sqlite3` is the one stdlib
# exception), so it is declared per project with a `[trust]` line rather than
# shipped here.
#
# The Python adapter (`adapters/python/analyze.py`) resolves each callee by
# declaration provenance — with ty (Astral's type checker, over its LSP), its
# sole resolution backend — and emits a canonical
# `::`-segmented symbol for every no-body external it sees: `subprocess::run`
# for a stdlib call,
# `builtins::open` for the ambient `open`, `pathlib::Path.mkdir` for a resolved
# pathlib I/O method, `<package>::<member>` for a third-party call. This table
# maps those symbols to their effect using the same segment-aligned matcher Rust
# and TypeScript use, so a project's `[roots]` / `[trust]` overrides work
# identically across all three languages. The adapter also emits these roots
# directly; this table keeps hinzu-core's Unknown classification in agreement and
# is the honest, auditable record of what Python's surface means.
#
# Un-listed third-party packages are NOT here: they are Unknown until a project
# vouches for them in its own `hinzu.toml` (`[trust] "yaml" = "pure"`, or
# `[trust] "psycopg" = ["db"]`). The well-known effectful packages the adapter
# seeds directly (requests, httpx, urllib3, aiohttp) are the pragmatic exception,
# documented in `notes/python-catalog.md`.

[roots]

# --- filesystem --------------------------------------------------------------
# `open` is the ambient builtin (like TypeScript's `fetch`); the `io` module,
# `shutil`, `tempfile`, `glob`, and `fileinput` are file I/O modules.
"builtins::open" = "fs"
"io::open" = "fs"
"io::FileIO" = "fs"
"shutil" = "fs"
"tempfile" = "fs"
"glob" = "fs"
"fileinput" = "fs"
"linecache" = "fs"

# os filesystem operations (the pure `os.path.join`-style helpers stay pure).
"os::open" = "fs"
"os::fdopen" = "fs"
"os::remove" = "fs"
"os::unlink" = "fs"
"os::mkdir" = "fs"
"os::makedirs" = "fs"
"os::rmdir" = "fs"
"os::removedirs" = "fs"
"os::listdir" = "fs"
"os::scandir" = "fs"
"os::walk" = "fs"
"os::stat" = "fs"
